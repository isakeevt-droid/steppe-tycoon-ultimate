<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Steppe Tycoon</title>
  <link rel="stylesheet" href="/frontend/style.css?v=9.5">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="boot" class="boot screen">
    <div class="boot-card">
      <div class="brand-line">🐫 Steppe Tycoon</div>
      <div id="boot_status" class="boot-text">Подключение…</div>
      <div id="boot_error" class="error"></div>
      <button id="boot_retry" class="btn primary hidden">Повторить</button>
    </div>
  </div>

  <div id="app" class="screen hidden">
    <header class="topbar">
      <div class="brand-row">
        <div>
          <div class="title">Steppe Tycoon</div>
          <div class="subtitle">Мобильная версия для Telegram</div>
        </div>
      </div>
      <div id="top_stats" class="stats-grid"></div>
    </header>

    <main class="main-content">
      <section id="tab-buildings" class="page active">
        <div class="quick-actions" id="quick_actions"></div>
        <div class="segmented">
          <button class="segment active" data-filter="producing">Добыча</button>
          <button class="segment" data-filter="processing">Переработка</button>
        </div>
        <div id="buildings_list" class="card-list"></div>
      </section>

      <section id="tab-warehouse" class="page">
        <div class="section-card">
          <div class="section-head">
            <div>
              <div class="section-title">Склад</div>
              <div id="warehouse_hint" class="section-subtitle"></div>
            </div>
            <button id="upgrade_storage_btn" class="btn">Улучшить</button>
          </div>
          <div class="storage-bar"><div id="storage_fill" class="storage-fill"></div></div>
        </div>
        <div id="warehouse_list" class="card-list compact-top"></div>
      </section>

      <section id="tab-caravans" class="page">
        <div class="section-card">
          <div class="section-title">Отправить караван</div>
          <div class="form-stack">
            <label class="field"><span>Маршрут</span><select id="route_select"></select></label>
            <label class="field"><span>Охрана</span><select id="guard_select"></select></label>
            <label class="field"><span>Товар</span><select id="resource_select"></select></label>
            <label class="field"><span>Количество</span><input id="caravan_amount" type="number" min="1" step="1"></label>
          </div>
          <div id="caravan_preview" class="hint-block"></div>
          <button id="send_caravan_btn" class="btn primary full">Отправить караван</button>
        </div>
        <div class="section-card">
          <div class="section-title">Активные</div>
          <div id="caravan_active" class="card-list"></div>
        </div>
        <div class="section-card">
          <div class="section-head">
            <div class="section-title">Завершённые</div>
            <button id="clear_completed_caravans_btn" class="btn tiny">Очистить</button>
          </div>
          <div id="caravan_completed" class="card-list"></div>
        </div>
      </section>

      <section id="tab-mine" class="page">
        <div class="mine-wrap">
          <div class="mine-summary" id="mine_summary"></div>
          <button id="mine_click_btn" class="mine-button">
            <span class="mine-icon">⛏️</span>
            <span class="mine-label">Добыть золото</span>
          </button>
          <div id="mine_float_layer" class="mine-float-layer"></div>
        </div>
        <div id="mine_upgrades" class="card-list compact-top"></div>
      </section>

      <section id="tab-achievements" class="page">
        <div id="achievements_summary" class="stats-grid compact-top"></div>
        <div class="section-card">
          <div class="section-title">Активные достижения</div>
          <div class="section-subtitle">Прогресс по текущим целям</div>
          <div id="achievements_active" class="card-list compact-top"></div>
        </div>
        <div class="section-card">
          <div class="section-title">Открытые достижения</div>
          <div class="section-subtitle">Уже полученные бонусы</div>
          <div id="achievements_completed" class="card-list compact-top"></div>
        </div>
      </section>

      <section id="tab-leaderboard" class="page">
        <div id="leaderboard_summary" class="stats-grid compact-top"></div>
        <div class="section-card">
          <div class="section-title">Топ игроков</div>
          <div class="section-subtitle">Сортировка по общему заработку</div>
          <div id="leaderboard_list" class="card-list compact-top"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="buildings">🏭<span>Здания</span></button>
      <button class="nav-btn" data-tab="warehouse">📦<span>Склад</span></button>
      <button class="nav-btn" data-tab="caravans">🐫<span>Караваны</span></button>
      <button class="nav-btn" data-tab="mine">⛏️<span>Шахта</span></button>
      <button class="nav-btn" data-tab="achievements">🏆<span>Достижения</span></button>
      <button class="nav-btn" data-tab="leaderboard">👑<span>Топ</span></button>
    </nav>
  </div>

  <script src="/frontend/app.js?v=9.5"></script>
</body>
</html>
